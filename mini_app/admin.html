<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>UniMatch Admin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg1: #0f0c29;
    --bg2: #302b63;
    --bg3: #24243e;
    --glass: rgba(255,255,255,0.07);
    --glass-border: rgba(255,255,255,0.13);
    --accent: #a78bfa;
    --accent2: #818cf8;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --card-radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);
    min-height: 100vh;
    color: var(--text);
    overflow-x: hidden;
  }

  /* ── Access Denied ── */
  #access-denied {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 16px;
    text-align: center;
    padding: 24px;
  }
  #access-denied .icon { font-size: 64px; }
  #access-denied h2 { font-size: 22px; color: var(--red); }
  #access-denied p { color: var(--text-dim); font-size: 14px; }

  /* ── Loading ── */
  #loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 16px;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid rgba(167,139,250,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── App ── */
  #app { display: none; flex-direction: column; min-height: 100vh; }

  /* ── Header ── */
  .header {
    background: rgba(15,12,41,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--glass-border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .header h1 { font-size: 17px; font-weight: 700; }
  .header-badge {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* ── Nav Tabs ── */
  .nav {
    display: flex;
    background: rgba(15,12,41,0.6);
    border-bottom: 1px solid var(--glass-border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav::-webkit-scrollbar { display: none; }
  .nav-tab {
    flex: 1;
    min-width: 70px;
    padding: 10px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    color: var(--text-dim);
    background: none;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .nav-tab .nav-icon { font-size: 20px; }
  .nav-tab.active { color: var(--accent); }
  .nav-tab.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 20%;
    right: 20%;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px 2px 0 0;
  }

  /* ── Content ── */
  .content { flex: 1; padding: 16px; overflow-y: auto; }
  .section { display: none; }
  .section.active { display: block; }

  /* ── Stat Cards ── */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--glass);
    backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: var(--card-radius);
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .stat-value { font-size: 28px; font-weight: 800; color: white; }
  .stat-label { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .stat-icon {
    position: absolute;
    right: 12px; top: 12px;
    font-size: 28px;
    opacity: 0.2;
  }

  /* ── Section Title ── */
  .section-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── Search + Add bar ── */
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    align-items: center;
  }
  .search-input {
    flex: 1;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus { border-color: var(--accent); }
  .btn {
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
  }
  .btn-primary:active { transform: scale(0.96); }
  .btn-danger {
    background: rgba(248,113,113,0.15);
    border: 1px solid rgba(248,113,113,0.3);
    color: var(--red);
  }
  .btn-edit {
    background: rgba(167,139,250,0.15);
    border: 1px solid rgba(167,139,250,0.3);
    color: var(--accent);
  }
  .btn-sm { padding: 6px 10px; font-size: 12px; border-radius: 8px; }

  /* ── Cards List ── */
  .card-list { display: flex; flex-direction: column; gap: 10px; }
  .item-card {
    background: var(--glass);
    backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: var(--card-radius);
    padding: 14px 16px;
    transition: border-color 0.2s;
  }
  .item-card:hover { border-color: rgba(167,139,250,0.35); }
  .item-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 8px;
  }
  .item-title { font-size: 14px; font-weight: 600; line-height: 1.3; }
  .item-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .item-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .badge {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    color: var(--text-dim);
  }
  .badge-green { background: rgba(52,211,153,0.15); color: var(--green); }
  .badge-red { background: rgba(248,113,113,0.15); color: var(--red); }
  .badge-yellow { background: rgba(251,191,36,0.15); color: var(--yellow); }
  .badge-purple { background: rgba(167,139,250,0.15); color: var(--accent); }
  .item-actions { display: flex; gap: 6px; flex-shrink: 0; }

  /* ── Pagination ── */
  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
    padding: 8px;
  }
  .pagination span { font-size: 13px; color: var(--text-dim); }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 200;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: linear-gradient(135deg, #1e1b4b, #312e81);
    border: 1px solid var(--glass-border);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 24px 20px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-close {
    background: rgba(255,255,255,0.1);
    border: none;
    color: var(--text);
    font-size: 18px;
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── Form ── */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; color: var(--text-dim); font-weight: 600; margin-bottom: 6px; display: block; }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--accent);
  }
  .form-select { appearance: none; }
  .form-textarea { resize: vertical; min-height: 80px; font-family: inherit; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-actions { display: flex; gap: 10px; margin-top: 20px; }
  .form-actions .btn { flex: 1; justify-content: center; padding: 12px; }

  /* ── User row ── */
  .user-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
  }
  .user-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 14px; font-weight: 600; }
  .user-meta { font-size: 11px; color: var(--text-dim); }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(52,211,153,0.95);
    color: #064e3b;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.error { background: rgba(248,113,113,0.95); color: #7f1d1d; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Toggle switch ── */
  .toggle-row { display: flex; align-items: center; justify-content: space-between; }
  .toggle { position: relative; display: inline-block; width: 44px; height: 24px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.15);
    border-radius: 24px;
    transition: 0.3s;
    cursor: pointer;
  }
  .toggle-slider::before {
    content: '';
    position: absolute;
    height: 18px; width: 18px;
    left: 3px; bottom: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.3s;
  }
  .toggle input:checked + .toggle-slider { background: var(--accent); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <p style="color:var(--text-dim);font-size:14px;">Загрузка...</p>
</div>

<!-- Access Denied -->
<div id="access-denied">
  <div class="icon">🔒</div>
  <h2>Доступ запрещён</h2>
  <p>Эта панель доступна только администратору.</p>
</div>

<!-- App -->
<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="header-logo">⚡</div>
      <div>
        <h1>UniMatch Admin</h1>
      </div>
    </div>
    <span class="header-badge">ADMIN</span>
  </div>

  <!-- Nav -->
  <div class="nav">
    <button class="nav-tab active" onclick="showSection('dashboard')">
      <span class="nav-icon">📊</span>Dashboard
    </button>
    <button class="nav-tab" onclick="showSection('programs')">
      <span class="nav-icon">🎓</span>Программы
    </button>
    <button class="nav-tab" onclick="showSection('users')">
      <span class="nav-icon">👥</span>Пользователи
    </button>
    <button class="nav-tab" onclick="showSection('templates')">
      <span class="nav-icon">📋</span>Шаблоны
    </button>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Dashboard -->
    <div class="section active" id="section-dashboard">
      <div class="section-title">📊 Dashboard</div>
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><div class="stat-value" id="s-users">—</div><div class="stat-label">Пользователи</div><div class="stat-icon">👤</div></div>
        <div class="stat-card"><div class="stat-value" id="s-programs">—</div><div class="stat-label">Программы</div><div class="stat-icon">🎓</div></div>
        <div class="stat-card"><div class="stat-value" id="s-active">—</div><div class="stat-label">Активных программ</div><div class="stat-icon">✅</div></div>
        <div class="stat-card"><div class="stat-value" id="s-deadlines">—</div><div class="stat-label">Дедлайны</div><div class="stat-icon">📅</div></div>
      </div>

      <div class="section-title" style="margin-top:8px">⚡ Быстрые действия</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <button class="btn btn-primary" style="justify-content:center;padding:14px" onclick="showSection('programs');openProgramModal()">
          ➕ Добавить программу
        </button>
        <button class="btn btn-edit" style="justify-content:center;padding:14px" onclick="showSection('templates');openTemplateModal()">
          ➕ Добавить шаблон документа
        </button>
      </div>
    </div>

    <!-- Programs -->
    <div class="section" id="section-programs">
      <div class="section-title">🎓 Программы</div>
      <div class="toolbar">
        <input class="search-input" id="program-search" placeholder="🔍 Поиск..." oninput="searchPrograms()">
        <button class="btn btn-primary btn-sm" onclick="openProgramModal()">➕</button>
      </div>
      <div class="card-list" id="programs-list"></div>
      <div class="pagination" id="programs-pagination"></div>
    </div>

    <!-- Users -->
    <div class="section" id="section-users">
      <div class="section-title">👥 Пользователи</div>
      <div class="card-list" id="users-list"></div>
      <div class="pagination" id="users-pagination"></div>
    </div>

    <!-- Templates -->
    <div class="section" id="section-templates">
      <div class="section-title">📋 Шаблоны документов</div>
      <div class="toolbar" style="justify-content:flex-end">
        <button class="btn btn-primary btn-sm" onclick="openTemplateModal()">➕ Добавить</button>
      </div>
      <div class="card-list" id="templates-list"></div>
    </div>

  </div><!-- /content -->
</div><!-- /app -->

<!-- Program Modal -->
<div class="modal-overlay" id="program-modal">
  <div class="modal">
    <div class="modal-title">
      <span id="program-modal-title">Программа</span>
      <button class="modal-close" onclick="closeModal('program-modal')">✕</button>
    </div>
    <input type="hidden" id="program-id">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Университет *</label>
        <input class="form-input" id="f-university" placeholder="MIT">
      </div>
      <div class="form-group">
        <label class="form-label">Программа *</label>
        <input class="form-input" id="f-program" placeholder="Computer Science">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Страна *</label>
        <input class="form-input" id="f-country" placeholder="USA">
      </div>
      <div class="form-group">
        <label class="form-label">Направление *</label>
        <select class="form-select" id="f-field">
          <option value="cs">CS</option>
          <option value="business">Business</option>
          <option value="engineering">Engineering</option>
          <option value="science">Science</option>
          <option value="medicine">Medicine</option>
          <option value="other">Other</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Степень *</label>
        <select class="form-select" id="f-degree">
          <option value="master">Master</option>
          <option value="bachelor">Bachelor</option>
          <option value="mba">MBA</option>
          <option value="phd">PhD</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Дедлайн</label>
        <input class="form-input" id="f-deadline" type="date">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Мин. GPA</label>
        <input class="form-input" id="f-gpa" type="number" step="0.1" placeholder="3.0">
      </div>
      <div class="form-group">
        <label class="form-label">Мин. IELTS</label>
        <input class="form-input" id="f-ielts" type="number" step="0.5" placeholder="6.5">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Стоимость (EUR/год)</label>
      <input class="form-input" id="f-tuition" type="number" placeholder="15000">
    </div>
    <div class="form-group">
      <label class="form-label">URL программы</label>
      <input class="form-input" id="f-url" placeholder="https://...">
    </div>
    <div class="form-group">
      <label class="form-label">Требования (текст)</label>
      <textarea class="form-textarea" id="f-requirements"></textarea>
    </div>
    <div class="form-group">
      <div class="toggle-row">
        <label class="form-label" style="margin:0">Активна</label>
        <label class="toggle"><input type="checkbox" id="f-active" checked><span class="toggle-slider"></span></label>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-danger" onclick="closeModal('program-modal')">Отмена</button>
      <button class="btn btn-primary" onclick="saveProgram()">💾 Сохранить</button>
    </div>
  </div>
</div>

<!-- Template Modal -->
<div class="modal-overlay" id="template-modal">
  <div class="modal">
    <div class="modal-title">
      <span id="template-modal-title">Шаблон документа</span>
      <button class="modal-close" onclick="closeModal('template-modal')">✕</button>
    </div>
    <input type="hidden" id="template-id">
    <div class="form-group">
      <label class="form-label">Тип степени *</label>
      <select class="form-select" id="t-degree">
        <option value="all">Все</option>
        <option value="master">Master</option>
        <option value="bachelor">Bachelor</option>
        <option value="mba">MBA</option>
        <option value="phd">PhD</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Документ *</label>
      <input class="form-input" id="t-name" placeholder="Рекомендательное письмо">
    </div>
    <div class="form-group">
      <label class="form-label">Подсказка</label>
      <textarea class="form-textarea" id="t-hint" placeholder="Нужно от научного руководителя..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Порядок</label>
      <input class="form-input" id="t-order" type="number" placeholder="0">
    </div>
    <div class="form-actions">
      <button class="btn btn-danger" onclick="closeModal('template-modal')">Отмена</button>
      <button class="btn btn-primary" onclick="saveTemplate()">💾 Сохранить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const API = '';
let token = null;
let programsPage = 1;
let usersPage = 1;
let programSearch = '';
let searchTimer = null;

// ── Auth ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const resp = await fetch(`${API}/auth/telegram`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ init_data: tg.initData || '' }),
    });
    const data = await resp.json();
    token = data.token;

    // Check admin access
    const statsResp = await fetch(`${API}/admin-api/stats`, {
      headers: { Authorization: `Bearer ${token}` }
    });

    if (statsResp.status === 403) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('access-denied').style.display = 'flex';
      return;
    }

    const stats = await statsResp.json();
    renderStats(stats);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('app').style.flexDirection = 'column';

    loadPrograms();
    loadUsers();
    loadTemplates();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('access-denied').style.display = 'flex';
  }
}

async function apiFetch(url, options = {}) {
  const resp = await fetch(`${API}${url}`, {
    ...options,
    headers: {
      Authorization: `Bearer ${token}`,
      'Content-Type': 'application/json',
      ...(options.headers || {}),
    },
  });
  if (!resp.ok) throw new Error(await resp.text());
  return resp.json();
}

// ── Sections ──────────────────────────────────────────────────────────────────
function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`section-${name}`).classList.add('active');
  const tabs = ['dashboard','programs','users','templates'];
  document.querySelectorAll('.nav-tab')[tabs.indexOf(name)].classList.add('active');
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function renderStats(s) {
  document.getElementById('s-users').textContent = s.users;
  document.getElementById('s-programs').textContent = s.programs;
  document.getElementById('s-active').textContent = s.active_programs;
  document.getElementById('s-deadlines').textContent = s.deadlines;
}

// ── Programs ──────────────────────────────────────────────────────────────────
async function loadPrograms() {
  const data = await apiFetch(`/admin-api/programs?page=${programsPage}&search=${encodeURIComponent(programSearch)}`);
  const list = document.getElementById('programs-list');
  if (!data.items.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🎓</div><p>Программ не найдено</p></div>';
    document.getElementById('programs-pagination').innerHTML = '';
    return;
  }
  list.innerHTML = data.items.map(p => `
    <div class="item-card">
      <div class="item-card-header">
        <div>
          <div class="item-title">${p.university_name}</div>
          <div class="item-sub">${p.program_name}</div>
        </div>
        <div class="item-actions">
          <button class="btn btn-edit btn-sm" onclick="editProgram(${p.id})">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="deleteProgram(${p.id})">🗑</button>
        </div>
      </div>
      <div class="item-badges">
        <span class="badge badge-purple">${p.country}</span>
        <span class="badge">${p.degree_type.toUpperCase()}</span>
        <span class="badge">${p.field}</span>
        ${p.tuition_year ? `<span class="badge badge-yellow">€${p.tuition_year.toLocaleString()}/yr</span>` : ''}
        ${p.deadline ? `<span class="badge badge-green">📅 ${p.deadline}</span>` : ''}
        ${p.is_active ? '<span class="badge badge-green">● Активна</span>' : '<span class="badge badge-red">● Неактивна</span>'}
      </div>
    </div>
  `).join('');
  renderPagination('programs', data.page, data.pages);
}

function renderPagination(type, page, pages) {
  const el = document.getElementById(`${type}-pagination`);
  if (pages <= 1) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <button class="btn btn-edit btn-sm" onclick="${type}Page(${page-1})" ${page===1?'disabled style="opacity:0.4"':''}>◀</button>
    <span>${page} / ${pages}</span>
    <button class="btn btn-edit btn-sm" onclick="${type}Page(${page+1})" ${page===pages?'disabled style="opacity:0.4"':''}>▶</button>
  `;
}

function programsPage_(p) { programsPage = p; loadPrograms(); }
window.programsPage = programsPage_;
function usersPage_(p) { usersPage = p; loadUsers(); }
window.usersPage = usersPage_;

function searchPrograms() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    programSearch = document.getElementById('program-search').value;
    programsPage = 1;
    loadPrograms();
  }, 400);
}

let editingProgramId = null;

function openProgramModal(program = null) {
  editingProgramId = null;
  document.getElementById('program-modal-title').textContent = '➕ Новая программа';
  ['university','program','country','deadline','url','requirements'].forEach(f => {
    const el = document.getElementById(`f-${f}`);
    if (el) el.value = '';
  });
  document.getElementById('f-field').value = 'cs';
  document.getElementById('f-degree').value = 'master';
  document.getElementById('f-gpa').value = '';
  document.getElementById('f-ielts').value = '';
  document.getElementById('f-tuition').value = '';
  document.getElementById('f-active').checked = true;
  document.getElementById('program-modal').classList.add('open');
}

async function editProgram(id) {
  const data = await apiFetch(`/admin-api/programs?page=1&search=`);
  // fetch all to find; better: get single by id via search or inline from DOM
  // We'll just reload from list data stored
  editingProgramId = id;
  document.getElementById('program-modal-title').textContent = '✏️ Редактировать программу';
  // Get program data from the current list
  const resp = await apiFetch(`/admin-api/programs?page=${programsPage}&search=${encodeURIComponent(programSearch)}`);
  const p = resp.items.find(x => x.id === id);
  if (!p) return;
  document.getElementById('f-university').value = p.university_name;
  document.getElementById('f-program').value = p.program_name;
  document.getElementById('f-country').value = p.country;
  document.getElementById('f-field').value = p.field;
  document.getElementById('f-degree').value = p.degree_type;
  document.getElementById('f-deadline').value = p.deadline || '';
  document.getElementById('f-gpa').value = p.min_gpa || '';
  document.getElementById('f-ielts').value = p.min_ielts || '';
  document.getElementById('f-tuition').value = p.tuition_year || '';
  document.getElementById('f-url').value = p.url || '';
  document.getElementById('f-active').checked = p.is_active;
  document.getElementById('program-modal').classList.add('open');
}

async function saveProgram() {
  const body = {
    university_name: document.getElementById('f-university').value.trim(),
    program_name: document.getElementById('f-program').value.trim(),
    country: document.getElementById('f-country').value.trim(),
    field: document.getElementById('f-field').value,
    degree_type: document.getElementById('f-degree').value,
    deadline: document.getElementById('f-deadline').value || null,
    min_gpa: parseFloat(document.getElementById('f-gpa').value) || 0,
    min_ielts: parseFloat(document.getElementById('f-ielts').value) || 0,
    tuition_year: parseInt(document.getElementById('f-tuition').value) || null,
    url: document.getElementById('f-url').value.trim() || null,
    requirements_text: document.getElementById('f-requirements').value.trim() || null,
    is_active: document.getElementById('f-active').checked,
  };
  if (!body.university_name || !body.program_name || !body.country) {
    showToast('Заполни обязательные поля', true); return;
  }
  try {
    if (editingProgramId) {
      await apiFetch(`/admin-api/programs/${editingProgramId}`, { method: 'PUT', body: JSON.stringify(body) });
    } else {
      await apiFetch('/admin-api/programs', { method: 'POST', body: JSON.stringify(body) });
    }
    closeModal('program-modal');
    showToast('Сохранено ✓');
    loadPrograms();
    refreshStats();
  } catch(e) {
    showToast('Ошибка: ' + e.message, true);
  }
}

async function deleteProgram(id) {
  if (!confirm('Удалить программу?')) return;
  await apiFetch(`/admin-api/programs/${id}`, { method: 'DELETE' });
  showToast('Удалено');
  loadPrograms();
  refreshStats();
}

// ── Users ─────────────────────────────────────────────────────────────────────
async function loadUsers() {
  const data = await apiFetch(`/admin-api/users?page=${usersPage}`);
  const list = document.getElementById('users-list');
  if (!data.items.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">👥</div><p>Пользователей нет</p></div>';
    document.getElementById('users-pagination').innerHTML = '';
    return;
  }
  list.innerHTML = data.items.map(u => `
    <div class="user-row">
      <div class="user-avatar">${(u.first_name || u.username || '?')[0].toUpperCase()}</div>
      <div class="user-info">
        <div class="user-name">${u.first_name || 'Без имени'} ${u.username ? '@'+u.username : ''}</div>
        <div class="user-meta">ID: ${u.user_id} · Активен: ${u.last_active || '—'}</div>
      </div>
    </div>
  `).join('');
  renderPagination('users', data.page, data.pages);
}

// ── Templates ─────────────────────────────────────────────────────────────────
async function loadTemplates() {
  const data = await apiFetch('/admin-api/templates');
  const list = document.getElementById('templates-list');
  if (!data.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><p>Шаблонов нет</p></div>';
    return;
  }
  const grouped = {};
  data.forEach(t => {
    if (!grouped[t.degree_type]) grouped[t.degree_type] = [];
    grouped[t.degree_type].push(t);
  });
  list.innerHTML = Object.entries(grouped).map(([deg, items]) => `
    <div style="margin-bottom:16px">
      <div style="font-size:12px;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding-left:4px">${deg}</div>
      ${items.map(t => `
        <div class="item-card" style="margin-bottom:8px">
          <div class="item-card-header">
            <div>
              <div class="item-title">${t.item_name}</div>
              ${t.hint ? `<div class="item-sub">${t.hint}</div>` : ''}
            </div>
            <div class="item-actions">
              <button class="btn btn-edit btn-sm" onclick="editTemplate(${t.id})">✏️</button>
              <button class="btn btn-danger btn-sm" onclick="deleteTemplate(${t.id})">🗑</button>
            </div>
          </div>
          <div class="item-badges">
            <span class="badge">#${t.order_index}</span>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
  window._templatesData = data;
}

let editingTemplateId = null;

function openTemplateModal() {
  editingTemplateId = null;
  document.getElementById('template-modal-title').textContent = '➕ Новый шаблон';
  document.getElementById('t-degree').value = 'all';
  document.getElementById('t-name').value = '';
  document.getElementById('t-hint').value = '';
  document.getElementById('t-order').value = '0';
  document.getElementById('template-modal').classList.add('open');
}

function editTemplate(id) {
  editingTemplateId = id;
  const t = (window._templatesData || []).find(x => x.id === id);
  if (!t) return;
  document.getElementById('template-modal-title').textContent = '✏️ Редактировать шаблон';
  document.getElementById('t-degree').value = t.degree_type;
  document.getElementById('t-name').value = t.item_name;
  document.getElementById('t-hint').value = t.hint || '';
  document.getElementById('t-order').value = t.order_index;
  document.getElementById('template-modal').classList.add('open');
}

async function saveTemplate() {
  const body = {
    degree_type: document.getElementById('t-degree').value,
    item_name: document.getElementById('t-name').value.trim(),
    hint: document.getElementById('t-hint').value.trim() || null,
    order_index: parseInt(document.getElementById('t-order').value) || 0,
  };
  if (!body.item_name) { showToast('Введи название документа', true); return; }
  try {
    if (editingTemplateId) {
      await apiFetch(`/admin-api/templates/${editingTemplateId}`, { method: 'PUT', body: JSON.stringify(body) });
    } else {
      await apiFetch('/admin-api/templates', { method: 'POST', body: JSON.stringify(body) });
    }
    closeModal('template-modal');
    showToast('Сохранено ✓');
    loadTemplates();
  } catch(e) {
    showToast('Ошибка: ' + e.message, true);
  }
}

async function deleteTemplate(id) {
  if (!confirm('Удалить шаблон?')) return;
  await apiFetch(`/admin-api/templates/${id}`, { method: 'DELETE' });
  showToast('Удалено');
  loadTemplates();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function refreshStats() {
  const stats = await apiFetch('/admin-api/stats');
  renderStats(stats);
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

init();
</script>
